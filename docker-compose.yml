services:

  # ── Banco de dados ──────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Spring Boot ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend/planta-smart-4.0
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${PORT:-8080}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}
    ports:
      - "${PORT:-8080}:${PORT:-8080}"

  # ── Frontend React/Vite ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/planta-smart-4.0
      dockerfile: Dockerfile
      args:
        # VITE_BASE_URL é embutida no bundle em build-time
        VITE_BASE_URL: ${VITE_BASE_URL}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  mysql_data:
