<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<header th:fragment="header">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@900&family=DM+Sans:wght@400;500;600;700&display=swap');

        :root {
            --red:        #E8001D;
            --red-dim:    rgba(232, 0, 29, 0.18);
            --red-border: rgba(232, 0, 29, 0.40);
            --nav-bg:     #0f0f0f;
            --nav-top:    #1a1a1a;
            --nav-height: 110px;
            --font:       'DM Sans', 'Segoe UI', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            padding-top: var(--nav-height);
            font-family: var(--font);
            background: #181818;
        }

        .site-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            font-family: var(--font);
            box-shadow: 0 4px 24px rgba(0,0,0,0.7);
        }

        .header-top {
            background: var(--nav-bg);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            height: 66px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-title .logo-box {
            background: var(--red);
            border-radius: 7px;
            padding: 5px 12px;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .header-title .logo-box img {
            height: 28px;
            width: auto;
            filter: brightness(0) invert(1);
        }

        .logo-wordmark {
            font-family: 'Big Shoulders Display', 'Arial Narrow', sans-serif;
            font-weight: 900;
            font-style: normal;
            font-size: 1.6rem;
            color: #ffffff;
            letter-spacing: 0.04em;
            line-height: 1;
            text-transform: uppercase;
            user-select: none;
            transform: skewX(-8deg);
            display: inline-block;
        }

        .header-title h1 {
            color: #ffffff;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            line-height: 1.2;
            white-space: nowrap;
        }

        .header-title h1 span {
            color: var(--red);
        }

        .header-nav {
            background: #141414;
            border-bottom: 2px solid var(--red);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 2rem;
            height: 44px;
            gap: 0.15rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 18px;
            text-decoration: none;
            color: #b0b0b0;
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: all 0.18s ease;
            white-space: nowrap;
        }

        .nav-link:hover {
            color: #ffffff;
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.10);
        }

        .nav-link.active {
            color: #ffffff;
            background: var(--red-dim);
            border-color: var(--red-border);
            font-weight: 600;
        }

        .nav-icon {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
            transition: transform 0.18s ease;
        }

        .nav-link:hover .nav-icon { transform: translateY(-1px); }

        .nav-sep {
            width: 1px;
            height: 18px;
            background: rgba(255,255,255,0.10);
            margin: 0 4px;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
        }

        .hamburger span {
            display: block;
            width: 22px;
            height: 2px;
            background: #aaa;
            border-radius: 2px;
            transition: all 0.25s ease;
        }

        .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        @media (max-width: 900px) {
            .header-title h1 { font-size: 0.85rem; }
        }

        @media (max-width: 768px) {
            :root { --nav-height: 66px; }

            .header-top { height: 66px; }

            .header-nav {
                position: absolute;
                top: 66px;
                left: 0; right: 0;
                height: auto;
                justify-content: flex-start;
                flex-direction: column;
                align-items: stretch;
                padding: 0.6rem 1.25rem 0.8rem;
                gap: 0.2rem;
                transform: translateY(-110%);
                opacity: 0;
                pointer-events: none;
                transition: transform 0.25s ease, opacity 0.25s ease;
            }

            .header-nav.open {
                transform: translateY(0);
                opacity: 1;
                pointer-events: all;
            }

            .nav-sep { display: none; }

            .nav-link {
                padding: 9px 14px;
                font-size: 0.85rem;
            }

            .hamburger { display: flex; }
        }
    </style>

    <div class="site-header">

        <div class="header-top">
            <div class="header-title">
                <div class="logo-box">
                    <span class="logo-wordmark">SENAI</span>
                </div>
                <h1>Sistema de Gerenciamento &mdash; Bancada Smart 4.0</h1>
            </div>

            <button class="hamburger" id="hamburgerBtn"
                    aria-label="Abrir menu" aria-expanded="false"
                    aria-controls="navbarMenu">
                <span></span><span></span><span></span>
            </button>
        </div>

        <nav class="header-nav" id="navbarMenu" aria-label="Navegação principal">

            <a th:href="@{/pedidos/novo}" class="nav-link" data-match="/pedidos/novo">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="1.8"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
                    <rect x="9" y="3" width="6" height="4" rx="2"/>
                    <path d="M9 12h6M9 16h4"/>
                </svg>
                Pedidos
            </a>

            <a th:href="@{/pedidos/listar}" class="nav-link" data-match="/pedidos/listar">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="1.8"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
                    <rect x="9" y="3" width="6" height="4" rx="2"/>
                    <path d="M9 12h6M9 16h4"/>
                </svg>
                Listar Pedidos
            </a>

            <div class="nav-sep" aria-hidden="true"></div>

            <a th:href="@{/estacoes}" class="nav-link" data-match="/estacoes">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="1.8"
                     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="2"  y="7"  width="6" height="10" rx="1"/>
                    <rect x="9"  y="3"  width="6" height="14" rx="1"/>
                    <rect x="16" y="10" width="6" height="7"  rx="1"/>
                    <line x1="2" y1="21" x2="22" y2="21"/>
                </svg>
                Estações
            </a>

        </nav>
    </div>

    <script>
        (function () {
            // ── Ativa link correspondente à URL atual ──
            var path = window.location.pathname;
            document.querySelectorAll('.nav-link[data-match]').forEach(function (a) {
                var match = a.getAttribute('data-match');
                if (match && path.startsWith(match)) {
                    a.classList.add('active');
                }
            });

            // ── Hamburger ──────────────────────────────
            var btn  = document.getElementById('hamburgerBtn');
            var menu = document.getElementById('navbarMenu');
            if (!btn || !menu) return;

            btn.addEventListener('click', function () {
                var open = menu.classList.toggle('open');
                btn.classList.toggle('open', open);
                btn.setAttribute('aria-expanded', String(open));
            });

            document.addEventListener('click', function (e) {
                if (!btn.contains(e.target) && !menu.contains(e.target)) {
                    menu.classList.remove('open');
                    btn.classList.remove('open');
                    btn.setAttribute('aria-expanded', 'false');
                }
            });
        })();
    </script>

</header>
</body>
</html>
