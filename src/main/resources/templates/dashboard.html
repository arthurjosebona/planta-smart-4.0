<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Smart 4.0</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>

<body>

    <main id="main-content">

        <!-- ── ESTOQUE ─────────────────────────────────────────────────── -->
        <form action="/dashboard/editar" method="post" class="estoque section">
            <h1 class="title">Estoque</h1>

            <div th:if="${editMode}" class="color-button-box">
                <button type="button" onclick="changeBlockColor('PRETO')">Preto</button>
                <button type="button" onclick="changeBlockColor('AZUL')">Azul</button>
                <button type="button" onclick="changeBlockColor('VERMELHO')">Vermelho</button>
                <button type="button" onclick="changeBlockColor('VAZIO')">Vazio</button>
            </div>

            <div class="view-estoque subsection">
                <div th:each="bloco : ${estoque}"
                     class="space"
                     th:data-posicao="${bloco.posicaoFisica}">
                    <input type="hidden" name="ids"   th:value="${bloco.id}">
                    <input type="hidden" name="cores" th:value="${bloco.corEstoque}">

                    <span th:class="'color-' + ${bloco.corEstoque} + ' block'"></span>
                    <span class="space-label" th:text="${bloco.posicaoFisica}"></span>
                </div>
            </div>

            <div class="button-box">
                <div th:if="${!editMode}">
                    <a href="/dashboard/editar" class="edit main">Editar Estoque</a>
                </div>
                <div th:if="${editMode}">
                    <button type="button" class="clear" onclick="cleanEstoque()">Limpar</button>
                    <a href="/dashboard" class="cancel">Cancelar</a>
                </div>
                <div th:if="${editMode}">
                    <button type="submit" class="save main">Salvar</button>
                </div>
            </div>
        </form>

        <section class="expedicao section">
            <h1 class="title">Expedição</h1>

            <div class="view-expedicao subsection">
                <div th:each="slot : ${expedicao}" class="slot">
                    <span class="slot-label" th:text="'#' + ${slot.posicaoFisica}"></span>
                    <span th:if="${slot.ordemDeProducaoAtual != null}"
                          class="slot-op"
                          th:text="${slot.ordemDeProducaoAtual}"></span>
                    <span th:if="${slot.ordemDeProducaoAtual == null}"
                          class="slot-op slot-vazio">—</span>
                </div>
            </div>
        </section>

    </main>

    <script th:if="${editMode}" th:src="@{/js/dashboard.js}"></script>

</body>
</html>
