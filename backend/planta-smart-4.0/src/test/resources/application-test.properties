# Profile de teste — banco H2 em memoria, isolado do MySQL de producao.
spring.datasource.url=jdbc:h2:mem:db_sa_smart40_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Schema limpo a cada execucao.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Desliga o inspector de queries de producao (usado so no profile default).
spring.jpa.properties.hibernate.generate_statistics=false
logging.level.org.hibernate.stat=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
