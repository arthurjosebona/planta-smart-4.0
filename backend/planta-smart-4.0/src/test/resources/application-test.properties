# Perfil de teste: banco H2 em memória, isolado do MySQL de produção.
# Ativado pelos testes de integração via @ActiveProfiles("test").

spring.datasource.url=jdbc:h2:mem:db_sa_smart40_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Schema recriado a cada execução da suíte a partir das entidades JPA.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Desliga as estatísticas de queries de produção para não poluir o log dos testes.
spring.jpa.properties.hibernate.generate_statistics=false
logging.level.org.hibernate.stat=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# IPs de CLP em loopback: nenhum teste de integração fala com CLP real.
clp.ips.expedicao=127.0.0.1
clp.ips.montagem=127.0.0.1
clp.ips.estoque=127.0.0.1
clp.ips.processo=127.0.0.1
clp.endpoints.esp32-tampas.ip=127.0.0.1
clp.endpoints.esp32-tampas.porta=80
